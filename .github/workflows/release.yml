name: test-and-release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Go test
        run: go test ./...

      - name: Local smoke test
        run: ./scripts/smoke-local.sh

      - name: Python syntax check
        run: python3 -m py_compile bin/aiops mcp/vpsops_mcp.py

      - name: Package linux release assets
        run: VERSION="${GITHUB_REF_NAME}" ./scripts/package-release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpsops-release-assets
          path: |
            dist/vpsops-execd_linux_amd64.tar.gz
            dist/vpsops-execd_linux_arm64.tar.gz
            dist/checksums.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/vpsops-execd_linux_amd64.tar.gz \
            dist/vpsops-execd_linux_arm64.tar.gz \
            dist/checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --notes "Linux amd64/arm64 aiops-execd release assets."
